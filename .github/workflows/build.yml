name: Build

# Triggered on PRs targeting main.
# Jobs only execute when the source branch is release/* or hotfix/*.
# Produces a build artifact to validate compilation BEFORE the merge.
# Branch protection rules on main must enforce that only those branches can open PRs.

on:
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: Quality
    if: startsWith(github.head_ref, 'release/') || startsWith(github.head_ref, 'hotfix/')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Type
        run: uv run ty check

      - name: Lint
        run: uv run ruff check --fix

      - name: Format
        run: uv run ruff format --check

  tests:
    name: Tests
    needs: quality
    if: startsWith(github.head_ref, 'release/') || startsWith(github.head_ref, 'hotfix/')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=term-missing

  build:
    name: Build Artifact
    needs: [quality, tests]
    if: startsWith(github.head_ref, 'release/') || startsWith(github.head_ref, 'hotfix/')
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $content = Get-Content "pyproject.toml" -Raw
          if ($content -match 'version\s*=\s*"([^"]+)"') {
            $version = $matches[1]
            Write-Host "Version: $version"
          } else {
            Write-Host "Could not determine version"
            exit 1
          }

          if ($version -match '^(\d+)\.(\d+)\.(\d+)$') {
            echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Invalid version format: $version"
            exit 1
          }

      - name: Build with Nuitka
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"

          .\builder.ps1 `
            -MainFile "main.py" `
            -OutputName "autoswitchtheme" `
            -IconFile "assets\icon.ico" `
            -CompanyName "NOVENTARIS" `
            -ProductName "AutoSwitchTheme" `
            -Version $version `
            -Standalone `
            -DisableConsole `
            -Execute `
            -DataFiles "assets"

      - name: Verify build
        shell: pwsh
        run: |
          $exePath = "autoswitchtheme.dist\autoswitchtheme.exe"
          if (Test-Path $exePath) {
            $size = [math]::Round((Get-Item $exePath).Length / 1MB, 2)
            Write-Host "Executable built successfully: $exePath ($size MB)"
          } else {
            Write-Host "Executable not found"
            exit 1
          }

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y
          refreshenv
          if (-not (Test-Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe")) {
            Write-Host "Inno Setup installation failed"
            exit 1
          }

      - name: Create installer
        id: create_installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $isccPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"

          $issContent = Get-Content "build_installer.iss" -Raw
          $issContent = $issContent -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$version`""
          $issContent | Set-Content "build_installer.iss" -NoNewline

          & $isccPath "build_installer.iss"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $installer = Get-ChildItem "autoswitchtheme.setup\auto-switch-theme_*_x86.exe" | Select-Object -First 1
          if ($installer) {
            $newName = "AutoSwitchTheme-$version-Setup.exe"
            Copy-Item $installer.FullName -Destination $newName
            Write-Host "Installer created: $newName"
          } else {
            Write-Host "Installer not found after compilation"
            exit 1
          }

      - name: Create portable archive
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $archiveName = "AutoSwitchTheme-$version-Portable.zip"
          Compress-Archive -Path "autoswitchtheme.dist\*" -DestinationPath $archiveName -Force
          Write-Host "Portable archive created: $archiveName"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autoswitchtheme-${{ steps.version.outputs.VERSION }}-pre-release
          path: |
            AutoSwitchTheme-*-Setup.exe
            AutoSwitchTheme-*-Portable.zip
          retention-days: 7
